<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interval — Calendar</title>
    <script src="js/onboarding-guard.js"></script>
    <script>
      (function () {
        try {
          if (localStorage.getItem("interval_theme") === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
          var ts = localStorage.getItem("interval_text_scale");
          if (ts === "sm" || ts === "lg") {
            document.documentElement.setAttribute("data-text-scale", ts);
          }
          var motion = localStorage.getItem("interval_motion");
          var reduce = false;
          if (motion === "reduce") reduce = true;
          else if (motion === "full") reduce = false;
          else if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) reduce = true;
          if (reduce) document.documentElement.setAttribute("data-reduced-motion", "reduce");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="css/live-session.css" />
    <link rel="stylesheet" href="css/calendar.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="sidebar__brand sidebar__brand--link" id="sidebar-brand-link" href="profile.html" aria-label="Profile">
          <svg class="sidebar__logo" viewBox="0 0 32 32" aria-hidden="true" fill="none">
            <line x1="16" y1="3" x2="16" y2="29" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="27.3" y1="9.5" x2="4.7" y2="22.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="4.7" y1="9.5" x2="27.3" y2="22.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span class="sidebar__title">Interval</span>
        </a>
        <nav class="sidebar__nav">
          <a class="sidebar__link" href="index.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            Dashboard
          </a>
          <a class="sidebar__link" href="tracker.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2" />
            </svg>
            Tracker
          </a>
          <a class="sidebar__link sidebar__link--active" href="calendar.html" aria-current="page">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="5" width="18" height="16" rx="2" />
              <path d="M8 3v4M16 3v4" />
            </svg>
            Calendar
          </a>
          <a class="sidebar__link" href="guide.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="4" width="16" height="16" rx="2" />
              <path d="M8 10h8M8 14h5" />
            </svg>
            Guide
          </a>
        </nav>
        <div class="sidebar__footer">
          <div class="sidebar__settings">
            <button
              type="button"
              class="sidebar__link sidebar__settings-trigger"
              id="sidebar-settings-toggle"
              aria-expanded="false"
              aria-controls="sidebar-settings-panel"
            >
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
              </svg>
              Settings
            </button>
            <div id="sidebar-settings-panel" class="sidebar__settings-panel" hidden>
              <div class="settings-field">
                <span class="settings-field__label">Appearance</span>
                <div class="theme-switch-row">
                  <span class="theme-switch-row__text" id="theme-mode-label">Dark mode</span>
                  <button
                    type="button"
                    class="theme-switch"
                    id="theme-switch"
                    role="switch"
                    aria-checked="true"
                    aria-labelledby="theme-mode-label"
                  >
                    <span class="theme-switch__knob"></span>
                  </button>
                </div>
              </div>
              <div class="settings-field">
                <label class="settings-field__label" for="setting-text-scale">Text size</label>
                <select class="settings-select" id="setting-text-scale" aria-label="Text size">
                  <option value="sm">Small</option>
                  <option value="md">Default</option>
                  <option value="lg">Large</option>
                </select>
              </div>
              <div class="settings-field">
                <label class="settings-field__label" for="setting-clock">Time</label>
                <select class="settings-select" id="setting-clock" aria-label="Time format">
                  <option value="12">12-hour</option>
                  <option value="24">24-hour</option>
                </select>
              </div>
              <div class="settings-field">
                <label class="settings-field__label" for="setting-week-start">Week starts</label>
                <select class="settings-select" id="setting-week-start" aria-label="First day of week">
                  <option value="monday">Monday</option>
                  <option value="sunday">Sunday</option>
                </select>
              </div>
              <div class="settings-field">
                <label class="settings-field__label" for="setting-motion">Motion</label>
                <select class="settings-select" id="setting-motion" aria-label="Animation preference">
                  <option value="system">Match system</option>
                  <option value="reduce">Reduce motion</option>
                  <option value="full">Full motion</option>
                </select>
              </div>
              <div class="settings-field">
                <span class="settings-field__label">Data</span>
                <button type="button" class="settings-btn" id="setting-export-sessions">
                  Download session backup
                </button>
              </div>
            </div>
          </div>
          <a class="sidebar__link" href="guide.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <path d="M12 16v-4M12 8h.01" />
            </svg>
            Help Center
          </a>
        </div>
      </aside>

      <div class="main">
        <header class="main__header">
          <h1 class="main__title">Calendar</h1>
          <div class="main__header-spacer"></div>
          <div class="header-meta">
            <span class="pill" id="today-date-pill">Today</span>
          </div>
        </header>

        <div class="cal-grid">

          <!-- Summary Bar -->
          <section class="card cell-cal-summary" aria-labelledby="cal-summary-heading">
            <h2 class="card__title" id="cal-summary-heading">Summary</h2>
            <div class="cal-summary-stats" id="cal-summary-stats">
              <!-- populated by JS -->
            </div>
          </section>

          <!-- Timeline Filter -->
          <section class="card cell-cal-filter" aria-labelledby="cal-filter-heading">
            <h2 class="card__title" id="cal-filter-heading">View</h2>
            <div class="cal-filter-group" role="group" aria-label="Calendar view">
              <button class="cal-filter-btn cal-filter-btn--active" data-view="month">Month</button>
              <button class="cal-filter-btn" data-view="week">Week</button>
              <button class="cal-filter-btn" data-view="day">Day</button>
            </div>
            <div class="cal-nav-row">
              <button class="cal-nav-btn" id="cal-prev" aria-label="Previous period">&#8592;</button>
              <span class="cal-nav-label" id="cal-nav-label"></span>
              <button class="cal-nav-btn" id="cal-next" aria-label="Next period">&#8594;</button>
            </div>
          </section>

          <!-- Session Detail (spans 2 rows) -->
          <section class="card cell-cal-detail" aria-labelledby="cal-detail-heading">
            <h2 class="card__title" id="cal-detail-heading">Session Detail</h2>
            <div id="cal-detail-content">
              <div class="cal-detail-empty">
                <span>Select a session<br>to view details</span>
              </div>
            </div>
          </section>

          <!-- Main Calendar -->
          <section class="card cell-cal-main" aria-labelledby="cal-main-heading">
            <h2 class="card__title" id="cal-main-heading" aria-live="polite"></h2>
            <div id="cal-main-content">
              <!-- populated by JS -->
            </div>
          </section>

        </div>
      </div>
    </div>

    <dialog id="cal-curve-expand-dialog" class="cal-curve-dialog" aria-labelledby="cal-curve-expand-title">
      <div class="cal-curve-dialog__inner">
        <div class="cal-curve-dialog__head">
          <h3 class="cal-curve-dialog__title" id="cal-curve-expand-title">Stability curve</h3>
          <button type="button" class="cal-curve-dialog__close" id="cal-curve-expand-close" aria-label="Close expanded chart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="cal-curve-dialog__chart-wrap">
          <svg
            id="cal-stability-chart-expanded"
            class="cal-stability-chart cal-stability-chart--expanded"
            viewBox="0 0 600 280"
            role="img"
            aria-label="Stability curve, large view"
          ></svg>
        </div>
      </div>
    </dialog>

    <script src="js/profile.js"></script>
    <script src="js/behavior-tracking.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/app-settings.js" defer></script>
    <script src="js/sidebar-brand.js" defer></script>
    <script src="js/session-calendar.js" defer></script>
    <script src="js/stability-chart-static.js" defer></script>
    <script src="js/calendar.js" defer></script>
  </body>
</html>
