<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interval — Calendar</title>
    <script src="js/onboarding-guard.js"></script>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("interval_theme");
          if (t === "light" || t === "amber") {
            document.documentElement.setAttribute("data-theme", t);
          }
          var ts = localStorage.getItem("interval_text_scale");
          if (ts === "sm" || ts === "lg") {
            document.documentElement.setAttribute("data-text-scale", ts);
          }
          var motion = localStorage.getItem("interval_motion");
          var reduce = false;
          if (motion === "reduce") reduce = true;
          else if (motion === "full") reduce = false;
          else if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) reduce = true;
          if (reduce) document.documentElement.setAttribute("data-reduced-motion", "reduce");
          var nl = localStorage.getItem("interval_nav_layout");
          if (nl === "top") document.documentElement.setAttribute("data-nav-layout", "top");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="css/live-session.css" />
    <link rel="stylesheet" href="css/calendar.css" />
  </head>

            Help Center

      <div class="main">
        <header class="main__header">
          <h1 class="main__title">Calendar</h1>
          <div class="main__header-spacer"></div>
          <div class="header-meta">
            <span class="pill" id="today-date-pill">Today</span>
          </div>
        </header>

        <div class="cal-grid">

          <!-- Summary Bar -->
          <section class="card cell-cal-summary" aria-labelledby="cal-summary-heading">
            <h2 class="card__title" id="cal-summary-heading">Summary</h2>
            <div class="cal-summary-stats" id="cal-summary-stats">
              <!-- populated by JS -->
            </div>
          </section>

          <!-- Timeline Filter -->
          <section class="card cell-cal-filter" aria-labelledby="cal-filter-heading">
            <h2 class="card__title" id="cal-filter-heading">View</h2>
            <div class="cal-filter-group" role="group" aria-label="Calendar view">
              <button class="cal-filter-btn cal-filter-btn--active" data-view="month">Month</button>
              <button class="cal-filter-btn" data-view="week">Week</button>
              <button class="cal-filter-btn" data-view="day">Day</button>
            </div>
            <div class="cal-nav-row">
              <button class="cal-nav-btn" id="cal-prev" aria-label="Previous period">&#8592;</button>
              <span class="cal-nav-label" id="cal-nav-label"></span>
              <button class="cal-nav-btn" id="cal-next" aria-label="Next period">&#8594;</button>
            </div>
          </section>

          <!-- Session Detail (spans 2 rows) -->
          <section class="card cell-cal-detail" aria-labelledby="cal-detail-heading">
            <h2 class="card__title" id="cal-detail-heading">Session Detail</h2>
            <div id="cal-detail-content">
              <div class="cal-detail-empty">
                <span>Select a session<br>to view details</span>
              </div>
            </div>
          </section>

          <!-- Main Calendar -->
          <section class="card cell-cal-main" aria-labelledby="cal-main-heading">
            <h2 class="card__title" id="cal-main-heading" aria-live="polite"></h2>
            <div id="cal-main-content">
              <!-- populated by JS -->
            </div>
          </section>

        </div>
      </div>
    </div>

    <dialog id="cal-curve-expand-dialog" class="cal-curve-dialog" aria-labelledby="cal-curve-expand-title">
      <div class="cal-curve-dialog__inner">
        <div class="cal-curve-dialog__head">
          <h3 class="cal-curve-dialog__title" id="cal-curve-expand-title">Stability curve</h3>
          <button type="button" class="cal-curve-dialog__close" id="cal-curve-expand-close" aria-label="Close expanded chart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M5 3L12 10L19 3L21 5L14 12L21 19L19 21L12 14L5 21L3 19L10 12L3 5Z"/>
            </svg>
          </button>
        </div>
        <div class="cal-curve-dialog__chart-wrap">
          <svg
            id="cal-stability-chart-expanded"
            class="cal-stability-chart cal-stability-chart--expanded"
            viewBox="0 0 600 280"
            role="img"
            aria-label="Stability curve, large view"
          ></svg>
        </div>
      </div>
    </dialog>

    <script src="js/profile.js"></script>
    <script src="js/behavior-tracking.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/app-settings.js" defer></script>
    <script src="js/sidebar-brand.js" defer></script>
    <script src="js/nav-layout.js" defer></script>
    <script src="js/session-calendar.js" defer></script>
    <script src="js/stability-chart-static.js" defer></script>
    <script src="js/calendar.js" defer></script>
  </body>
</html>
