<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interval — Profile</title>
    <script src="js/onboarding-guard.js"></script>
    <script>
      (function () {
        try {
          if (localStorage.getItem("interval_theme") === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="css/live-session.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="sidebar__brand sidebar__brand--link" id="sidebar-brand-link" href="profile.html" aria-label="Profile">
          <svg class="sidebar__logo" viewBox="0 0 32 32" aria-hidden="true" fill="none">
            <line x1="16" y1="3" x2="16" y2="29" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            <line x1="27.3" y1="9.5" x2="4.7" y2="22.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
            <line x1="4.7" y1="9.5" x2="27.3" y2="22.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
          </svg>
          <span class="sidebar__title">Interval</span>
        </a>
        <nav class="sidebar__nav">
          <a class="sidebar__link" href="index.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            Dashboard
          </a>
          <a class="sidebar__link" href="tracker.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2" />
            </svg>
            Tracker
          </a>
          <a class="sidebar__link" href="calendar.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="5" width="18" height="16" rx="2" />
              <path d="M8 3v4M16 3v4" />
            </svg>
            Calendar
          </a>
          <a class="sidebar__link" href="guide.html">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="4" width="16" height="16" rx="2" />
              <path d="M8 10h8M8 14h5" />
            </svg>
            Guide
          </a>
        </nav>
        <div class="sidebar__footer">
          <div class="sidebar__settings">
            <button
              type="button"
              class="sidebar__link sidebar__settings-trigger"
              id="sidebar-settings-toggle"
              aria-expanded="false"
              aria-controls="sidebar-settings-panel"
            >
              <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
              </svg>
              Settings
            </button>
            <div id="sidebar-settings-panel" class="sidebar__settings-panel" hidden>
              <div class="settings-field">
                <span class="settings-field__label">Appearance</span>
                <div class="theme-switch-row">
                  <span class="theme-switch-row__text" id="theme-mode-label">Dark mode</span>
                  <button
                    type="button"
                    class="theme-switch"
                    id="theme-switch"
                    role="switch"
                    aria-checked="true"
                    aria-labelledby="theme-mode-label"
                  >
                    <span class="theme-switch__knob"></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <a class="sidebar__link" href="#">
            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <path d="M12 16v-4M12 8h.01" />
            </svg>
            Help Center
          </a>
        </div>
      </aside>

      <div class="main">
        <header class="main__header">
          <h1 class="main__title">Profile</h1>
        </header>
        <div class="card profile-view-card">
          <div id="profile-view" class="profile-view-root"></div>
        </div>
      </div>
    </div>
    <script src="js/profile.js"></script>
    <script src="js/behavior-tracking.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/sidebar-brand.js" defer></script>
    <script src="js/profile-page.js" defer></script>
  </body>
</html>
